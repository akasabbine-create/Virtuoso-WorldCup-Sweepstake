<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Sweepstake</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main>
    <h1>🏆 World Cup Sweepstake Leaderboard</h1>

    <section class="summary">
      <p>
        Live leaderboard for the Virtuoso World Cup Sweepstake.
        Rankings update automatically when new match data is available.
      </p>
    </section>

    <table id="board">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th>Teams</th>
          <th>Games Played</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5">Loading leaderboard...</td>
        </tr>
      </tbody>
    </table>

    <p class="note">
      Points are calculated automatically from completed match results.
    </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
